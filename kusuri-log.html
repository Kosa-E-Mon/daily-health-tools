<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>くすりログ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN DIRECTION: 深夜の調剤室
   濃紺ベース・白カード・翠緑アクセント
   清潔感×信頼感×落ち着き
═══════════════════════════════════════ */
:root{
  --bg:#0F172A;
  --bg2:#1E293B;
  --card:#FFFFFF;
  --card2:#F8FAFF;
  --primary:#0EA5E9;
  --primary-d:#0284C7;
  --primary-dim:#E0F2FE;
  --teal:#0D9488;
  --teal-dim:#CCFBF1;
  --amber:#F59E0B;
  --amber-dim:#FEF3C7;
  --rose:#F43F5E;
  --rose-dim:#FFE4E6;
  --violet:#7C3AED;
  --violet-dim:#EDE9FE;
  --text:#0F172A;
  --text2:#64748B;
  --text3:#94A3B8;
  --border:#E2E8F0;
  --shadow:0 1px 8px rgba(15,23,42,.08);
  --shadow-md:0 4px 20px rgba(15,23,42,.12);
  --shadow-lg:0 8px 40px rgba(15,23,42,.20);
  --r:18px;
  --rs:12px;
  --nav:68px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  max-width:430px;
  margin:0 auto;
  overflow-x:hidden;
  position:relative;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:0;}

/* ── PAGES ── */
.page{display:none;min-height:100vh;padding-bottom:calc(var(--nav) + var(--safe-b) + 16px);}
.page.active{display:block;animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ── HEADER ── */
.ph{
  background:var(--bg);
  padding:18px 20px 14px;
  position:sticky;top:0;z-index:60;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.ph-left h1{font-size:24px;font-weight:900;color:#fff;letter-spacing:-.5px;}
.ph-left .sub{font-size:12px;color:var(--text3);margin-top:2px;}
.ph-right{display:flex;gap:8px;}

/* ── NAV ── */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  height:calc(var(--nav) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:rgba(15,23,42,.96);
  backdrop-filter:blur(12px);
  display:flex;
  border-top:1px solid rgba(255,255,255,.08);
  z-index:100;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;background:none;border:none;
  cursor:pointer;color:rgba(255,255,255,.35);font-size:10px;
  font-family:inherit;font-weight:700;letter-spacing:.02em;
  transition:color .2s;padding:0;
}
.nb.active{color:var(--primary);}
.nb svg{width:22px;height:22px;transition:transform .2s;}
.nb.active svg{transform:scale(1.1);}
.nb-dot{
  width:4px;height:4px;border-radius:50%;background:var(--rose);
  position:absolute;top:8px;right:calc(50% - 16px);display:none;
}
.nb-dot.show{display:block;}

/* ══════════════════════════
   TODAY PAGE
══════════════════════════ */
.today-hero{
  margin:14px 16px;
  border-radius:var(--r);
  background:linear-gradient(135deg,var(--primary-d) 0%,var(--primary) 60%,#38BDF8 100%);
  padding:20px 22px;
  color:white;
  display:flex;justify-content:space-between;align-items:center;
  position:relative;overflow:hidden;
}
.today-hero::before{
  content:'';position:absolute;right:-20px;top:-20px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.08);
}
.today-hero::after{
  content:'';position:absolute;right:20px;bottom:-30px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.th-left .th-lbl{font-size:11px;opacity:.8;letter-spacing:.06em;text-transform:uppercase;}
.th-left .th-cnt{font-size:42px;font-weight:900;line-height:1.1;font-family:'DM Mono',monospace;}
.th-left .th-of{font-size:13px;opacity:.75;}
.th-ring{
  width:74px;height:74px;z-index:1;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(255,255,255,.15);border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
}
.th-pct{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;}
.th-pct-l{font-size:10px;opacity:.75;}

/* SECTION HEADER */
.sec-h{
  margin:16px 16px 8px;
  display:flex;align-items:center;gap:8px;
}
.sec-h-bar{width:3px;height:16px;background:var(--primary);border-radius:2px;flex-shrink:0;}
.sec-h-txt{font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;}
.sec-h-badge{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;
  background:var(--rose-dim);color:var(--rose);margin-left:auto;
}

/* DOSE CARD */
.dose-card{
  background:var(--card);border-radius:var(--rs);
  padding:13px 14px;margin:0 16px 8px;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);
  transition:opacity .25s,transform .2s;
  position:relative;
}
.dose-card.taken{opacity:.45;}
.dose-card.taken .dname{text-decoration:line-through;color:var(--text2);}
.dose-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.dose-icon.medicine{background:var(--primary-dim);}
.dose-icon.supplement{background:var(--teal-dim);}
.dinfo{flex:1;min-width:0;}
.dname{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ddet{font-size:12px;color:var(--text2);margin-top:2px;}
.dstock{font-size:11px;margin-top:3px;}
.dstock.low{color:var(--rose);}
.dstock.ok{color:var(--teal);}
.dcheck{
  width:38px;height:38px;border-radius:50%;
  border:2px solid var(--border);flex-shrink:0;
  background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:transparent;
  transition:all .2s;
}
.dcheck.taken{background:var(--teal);border-color:var(--teal);color:white;}
.dcheck.overdue{border-color:var(--rose);color:var(--rose);}
.dcheck.overdue::after{content:'!';}

/* ══════════════════════════
   SCAN PAGE
══════════════════════════ */
.scan-content{padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:18px;}

/* NFC BIG BUTTON */
.nfc-area{
  width:100%;
  background:var(--bg2);
  border-radius:var(--r);
  padding:28px 20px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.nfc-ring{
  width:160px;height:160px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary-d),var(--primary));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:white;cursor:pointer;border:none;
  font-family:inherit;font-size:14px;font-weight:700;
  box-shadow:0 8px 32px rgba(14,165,233,.35);
  transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.nfc-ring:active{transform:scale(.95);box-shadow:0 4px 16px rgba(14,165,233,.25);}
.nfc-ring.scanning::before,.nfc-ring.scanning::after{
  content:'';position:absolute;border-radius:50%;
  border:2px solid rgba(255,255,255,.35);
  animation:ripple 2s infinite ease-out;
}
.nfc-ring.scanning::after{animation-delay:.7s;}
@keyframes ripple{
  0%{width:40%;height:40%;opacity:.8;top:30%;left:30%;}
  100%{width:160%;height:160%;opacity:0;top:-30%;left:-30%;}
}
.nfc-status{font-size:13px;color:var(--text3);text-align:center;}

/* SCAN RESULT CARD */
.scan-result{
  width:100%;border-radius:var(--rs);
  padding:16px;display:none;
  flex-direction:column;gap:10px;
}
.scan-result.ok{background:var(--teal-dim);display:flex;}
.scan-result.ng{background:var(--rose-dim);display:flex;}
.scan-result.inf{background:var(--primary-dim);display:flex;}
.sr-top{display:flex;align-items:center;gap:10px;}
.sr-icon{font-size:22px;}
.sr-text{flex:1;}
.sr-title{font-size:15px;font-weight:700;}
.sr-detail{font-size:12px;color:var(--text2);margin-top:2px;}
.sr-undo{
  width:100%;padding:10px;border-radius:var(--rs);
  border:1.5px solid rgba(0,0,0,.1);background:white;
  cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;
  color:var(--rose);transition:all .15s;
}
.sr-undo:hover{background:var(--rose-dim);}

/* MANUAL LIST */
.manual-section{width:100%;}

/* ══════════════════════════
   MEDS PAGE
══════════════════════════ */
.mlist{padding:0 16px 8px;display:flex;flex-direction:column;gap:12px;}

.med-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-md);overflow:hidden;}
.mc-main{padding:16px;display:flex;gap:12px;align-items:flex-start;}
.mc-icon{
  width:50px;height:50px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
}
.mc-icon.medicine{background:var(--primary-dim);}
.mc-icon.supplement{background:var(--teal-dim);}
.mc-body{flex:1;min-width:0;}
.mc-name{font-size:16px;font-weight:800;}
.mc-tags{display:flex;gap:5px;flex-wrap:wrap;margin:5px 0 3px;}
.tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:100px;letter-spacing:.02em;}
.tag-med{background:var(--primary-dim);color:var(--primary-d);}
.tag-sup{background:var(--teal-dim);color:var(--teal);}
.tag-tim{background:#F1F5F9;color:var(--text2);}
.tag-nfc{background:var(--violet-dim);color:var(--violet);}
.mc-note{font-size:12px;color:var(--text2);}
.mc-btns{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.icon-btn{
  width:32px;height:32px;border-radius:9px;border:none;
  background:var(--card2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .15s;
}
.icon-btn:hover{background:var(--primary-dim);color:var(--primary-d);}
.icon-btn.del:hover{background:var(--rose-dim);color:var(--rose);}

/* STOCK SECTION (inside med card) */
.mc-stock{
  border-top:1px solid var(--border);
  padding:12px 16px;background:var(--card2);
}
.ms-row{display:flex;align-items:center;margin-bottom:6px;}
.ms-lbl{font-size:12px;color:var(--text2);flex:1;}
.ms-val{font-size:13px;font-weight:800;}
.ms-val.danger{color:var(--rose);}
.ms-reorder{font-size:11px;color:var(--amber);margin-left:8px;font-weight:700;}
.pbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.pfill{height:100%;border-radius:2px;transition:width .5s ease;}
.ms-btns{display:flex;gap:8px;}
.ms-btn{
  flex:1;padding:8px 0;border-radius:var(--rs);
  border:1.5px solid var(--border);background:var(--card);
  cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;
  color:var(--text2);transition:all .15s;
}
.ms-btn:hover,.ms-btn:active{border-color:var(--primary);color:var(--primary-d);background:var(--primary-dim);}
.ms-btn.buy{background:var(--teal-dim);color:var(--teal);border-color:var(--teal);}
.ms-btn.buy:hover{background:var(--teal);color:white;}

/* FAB */
.fab{
  position:fixed;
  bottom:calc(var(--nav) + var(--safe-b) + 14px);
  right:max(14px,calc(50vw - 201px));
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary-d),var(--primary));
  color:white;border:none;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(14,165,233,.45);
  z-index:90;font-size:26px;font-weight:300;
  transition:transform .15s,box-shadow .15s;
}
.fab:active{transform:scale(.93);}

/* ══════════════════════════
   HISTORY PAGE
══════════════════════════ */
.hlist{padding:0 16px;display:flex;flex-direction:column;gap:5px;}
.h-day{
  font-size:11px;font-weight:800;color:var(--text3);
  padding:14px 0 5px;letter-spacing:.05em;
  text-transform:uppercase;
}
.h-item{
  background:var(--card);border-radius:var(--rs);
  padding:11px 14px;display:flex;align-items:center;gap:11px;
  box-shadow:var(--shadow);
}
.h-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.h-info{flex:1;min-width:0;}
.h-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.h-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.h-badge{
  font-size:10px;font-weight:800;padding:2px 8px;
  border-radius:100px;white-space:nowrap;flex-shrink:0;
}

/* ══════════════════════════
   ALERT BAR
══════════════════════════ */
.alert-bar{
  margin:0 16px 10px;padding:11px 14px;border-radius:var(--rs);
  display:flex;align-items:center;gap:10px;cursor:pointer;
  border-left:4px solid var(--amber);background:var(--amber-dim);
  font-size:13px;font-weight:700;color:#92400E;
  transition:opacity .15s;
}
.alert-bar:active{opacity:.8;}
.alert-bar.crit{border-color:var(--rose);background:var(--rose-dim);color:#9F1239;}

/* ══════════════════════════
   MODALS
══════════════════════════ */
.overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.7);
  backdrop-filter:blur(4px);
  z-index:200;display:none;align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex;animation:ov-in .2s ease;}
@keyframes ov-in{from{opacity:0;}to{opacity:1;}}
.sheet{
  background:var(--card);border-radius:24px 24px 0 0;
  width:100%;max-width:430px;
  max-height:94vh;overflow-y:auto;
  padding:18px 20px calc(24px + var(--safe-b));
  animation:sheet-in .25s cubic-bezier(.32,0,.15,1);
}
@keyframes sheet-in{from{transform:translateY(60px);}to{transform:translateY(0);}}
.sheet-handle{
  width:36px;height:4px;background:var(--border);
  border-radius:2px;margin:0 auto 18px;
}
.sheet-title{font-size:18px;font-weight:900;margin-bottom:18px;color:var(--text);}

/* FORM ELEMENTS */
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:800;color:var(--text2);margin-bottom:6px;display:block;
  text-transform:uppercase;letter-spacing:.05em;}
.fi,.fs{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--border);border-radius:var(--rs);
  font-size:15px;font-family:inherit;color:var(--text);
  background:var(--card2);outline:none;transition:border-color .2s;
}
.fi:focus,.fs:focus{border-color:var(--primary);}
.fi.mono{font-family:'DM Mono',monospace;font-size:13px;}
.row2{display:flex;gap:12px;}
.row2 .fg{flex:1;}

/* TYPE SELECTOR */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.type-chip{
  padding:14px 8px;border-radius:var(--rs);border:2px solid var(--border);
  background:var(--card2);cursor:pointer;font-family:inherit;font-size:13px;
  font-weight:700;color:var(--text2);text-align:center;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.type-chip span{font-size:22px;}
.type-chip.on.medicine{background:var(--primary-dim);border-color:var(--primary);color:var(--primary-d);}
.type-chip.on.supplement{background:var(--teal-dim);border-color:var(--teal);color:var(--teal);}

/* TIMING CHIPS */
.t-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.t-chip{
  padding:10px 4px;border-radius:var(--rs);border:1.5px solid var(--border);
  background:var(--card2);cursor:pointer;font-family:inherit;font-size:13px;
  font-weight:700;color:var(--text2);text-align:center;transition:all .15s;
}
.t-chip.on{background:var(--primary-dim);border-color:var(--primary);color:var(--primary-d);}

/* TOGGLE */
.tog-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;background:var(--card2);border-radius:var(--rs);
  cursor:pointer;
}
.tog-lbl{font-size:14px;font-weight:700;color:var(--text);}
.tog{
  width:46px;height:26px;background:var(--border);border-radius:13px;
  position:relative;border:none;cursor:pointer;transition:background .2s;flex-shrink:0;
}
.tog.on{background:var(--primary);}
.tog::after{
  content:'';position:absolute;width:20px;height:20px;
  background:white;border-radius:50%;top:3px;left:3px;
  transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.25);
}
.tog.on::after{transform:translateX(20px);}

/* NFC LINK ROW */
.nfc-link{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--card2);border-radius:var(--rs);cursor:pointer;
  border:1.5px solid var(--border);transition:all .2s;
}
.nfc-link.linked{border-color:var(--teal);background:var(--teal-dim);}
.nfc-link-lbl{font-size:14px;font-weight:700;flex:1;}
.nfc-link-st{font-size:12px;color:var(--text2);}

/* BUTTONS */
.btn{
  width:100%;padding:14px;border-radius:var(--rs);border:none;
  font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn:active{transform:scale(.98);}
.btn-primary{background:linear-gradient(135deg,var(--primary-d),var(--primary));color:white;}
.btn-ghost{
  background:var(--card2);color:var(--text2);
  border:1.5px solid var(--border);margin-top:8px;
}

/* STOCK MODAL TABS */
.stab-row{display:flex;gap:8px;margin-bottom:16px;}
.stab{
  flex:1;padding:10px;border-radius:var(--rs);
  border:1.5px solid var(--border);background:var(--card2);
  cursor:pointer;font-family:inherit;font-size:13px;font-weight:800;
  color:var(--text2);text-align:center;transition:all .15s;
}
.stab.on{background:var(--primary-dim);border-color:var(--primary);color:var(--primary-d);}

/* CUR STOCK BOX */
.stock-box{
  background:var(--bg2);border-radius:var(--rs);
  padding:14px 16px;margin-bottom:18px;
}
.sb-lbl{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.sb-val{font-size:30px;font-weight:900;color:white;font-family:'DM Mono',monospace;}
.sb-sub{font-size:12px;color:var(--text3);margin-top:4px;}

/* LOT HISTORY */
.lot-hist{margin-top:18px;border-top:1px solid var(--border);padding-top:14px;}
.lot-hist-ttl{font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:8px;}
.lot-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;
}
.lot-item:last-child{border-bottom:none;}
.lot-date{color:var(--text2);flex-shrink:0;font-size:11px;width:85px;font-family:'DM Mono',monospace;}
.lot-qty{font-weight:800;flex-shrink:0;min-width:54px;}
.lot-qty.add{color:var(--teal);}
.lot-qty.fix{color:var(--rose);}
.lot-note{color:var(--text2);font-size:12px;flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--text2);}
.empty-icon{font-size:52px;margin-bottom:14px;}
.empty p{font-size:14px;line-height:1.8;}

/* BANNER */
.banner{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  max-width:390px;width:calc(100% - 32px);
  padding:13px 18px;border-radius:var(--r);
  font-size:14px;font-weight:700;z-index:500;
  display:none;align-items:center;gap:10px;
  box-shadow:var(--shadow-lg);
}
.banner.ok{background:#059669;color:white;display:flex;animation:bn .25s ease;}
.banner.ng{background:var(--rose);color:white;display:flex;animation:bn .25s ease;}
.banner.inf{background:var(--primary-d);color:white;display:flex;animation:bn .25s ease;}
.banner.warn{background:var(--amber);color:white;display:flex;animation:bn .25s ease;}

<!-- ══════════════════════════════════════
     SCRIPT
══════════════════════════════════════ -->
<script>
// ═══════════════════════════════
//  CONSTANTS
// ═══════════════════════════════
const TL = {
  morning:'朝', noon:'昼', evening:'夜',
  before_meal:'食前', after_meal:'食後', between_meals:'食間'
};

/*
 * 時刻判定ウィンドウ
 * [開始h, 終了h] — この範囲の時刻ならそのタイミングとして記録
 * 食前/食後/食間は朝昼夜に重ねて判定（後述）
 */
const TW = {
  morning:       [5,  10],
  noon:          [10, 15],
  evening:       [17, 24],
  before_meal:   [5,  24],   // 時刻判定では低優先度
  after_meal:    [5,  24],
  between_meals: [5,  24],
};
// 時刻マッチング優先度（低いほど優先）
const T_PRIORITY = {
  morning:0, noon:0, evening:0,
  before_meal:1, after_meal:1, between_meals:1
};

const TORDER = ['morning','noon','evening','before_meal','after_meal','between_meals'];

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let S = { medicines:[], records:[], lots:[] };
let editId       = null;
let stockMid     = null;
let pendingTag   = null;
let linkingNFC   = false;
let curType      = 'medicine';
let useStock     = false;
let stockTab     = 'add';
let bannerTimer  = null;
let lastScanRecord = null;   // 直前のスキャン記録（取り消し用）

const uid       = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const todayKey  = () => new Date().toISOString().slice(0, 10);
const save      = () => localStorage.setItem('kl_v3', JSON.stringify(S));

function load() {
  try {
    const r = localStorage.getItem('kl_v3');
    if (r) S = JSON.parse(r);
  } catch(e){}
  if (!S.lots) S.lots = [];
}

const isTaken = (mid, t, date) =>
  S.records.some(r => r.mid === mid && r.timing === t && r.ts.startsWith(date));

// ═══════════════════════════════
//  タイミング時刻判定
//  現在時刻から「最も適切なタイミング」を選ぶ
// ═══════════════════════════════
function pickTimingByHour(timings, hour, date, mid) {
  // 1. 今日まだ飲んでいないタイミングのみ
  const untaken = timings.filter(t => !isTaken(mid, t, date));
  if (!untaken.length) return null; // 全部飲んだ

  // 2. 現在時刻ウィンドウに合うもの（優先度高→低）
  const inWindow = untaken.filter(t => hour >= TW[t][0] && hour < TW[t][1]);
  if (inWindow.length) {
    // 優先度でソート（朝昼夜 > 食前食後食間）→最初の1つ
    inWindow.sort((a,b) => T_PRIORITY[a] - T_PRIORITY[b]);
    return inWindow[0];
  }

  // 3. 窓外（深夜等）→ 直近の未記録タイミングをTORDER順で返す
  return untaken.sort((a,b) => TORDER.indexOf(a) - TORDER.indexOf(b))[0];
}

// ═══════════════════════════════
//  NAVIGATION
// ═══════════════════════════════
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  document.getElementById('pg-' + name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('fab').style.display = name === 'meds' ? 'flex' : 'none';
  if (name === 'today')   renderToday();
  if (name === 'scan')    renderManual();
  if (name === 'meds')    renderMeds();
  if (name === 'history') renderHistory();
}

// ═══════════════════════════════
//  TODAY
// ═══════════════════════════════
function renderToday() {
  const now   = new Date();
  const h     = now.getHours();
  const today = todayKey();
  document.getElementById('today-date').textContent =
    now.toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric', weekday:'long'});

  const act = S.medicines.filter(m => m.active !== false);
  let total = 0, done = 0;
  act.forEach(m => m.timings.forEach(t => {
    total++;
    if (isTaken(m.id, t, today)) done++;
  }));
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  // 飲み忘れ数
  let missed = 0;
  act.forEach(m => m.timings.forEach(t => {
    if (h >= TW[t][1] && !isTaken(m.id, t, today)) missed++;
  }));

  let html = `
    <div class="today-hero">
      <div class="th-left">
        <div class="th-lbl">本日の服用</div>
        <div class="th-cnt">${done}<span style="font-size:18px;font-weight:500;opacity:.7"> / ${total}</span></div>
        <div class="th-of">${missed > 0 ? `⚠ ${missed}件 飲み忘れあり` : done === total && total > 0 ? '✅ 全部完了！' : '記録してください'}</div>
      </div>
      <div class="th-ring">
        <div class="th-pct">${pct}%</div>
        <div class="th-pct-l">達成率</div>
      </div>
    </div>`;

  if (!act.length) {
    html += `<div class="empty"><div class="empty-icon">💊</div>
      <p>薬・サプリが未登録です<br>「くすり」タブから追加してください</p></div>`;
  } else {
    const groups = {};
    act.forEach(m => m.timings.forEach(t => {
      if (!groups[t]) groups[t] = [];
      groups[t].push(m);
    }));
    TORDER.forEach(t => {
      if (!groups[t]) return;
      const missedInSec = groups[t].filter(m => h >= TW[t][1] && !isTaken(m.id, t, today)).length;
      html += `<div class="sec-h">
        <div class="sec-h-bar"></div>
        <div class="sec-h-txt">${TL[t]}</div>
        ${missedInSec ? `<div class="sec-h-badge">⚠ ${missedInSec}件</div>` : ''}
      </div>`;
      groups[t].forEach(m => {
        const taken  = isTaken(m.id, t, today);
        const overdue = !taken && h >= TW[t][1];
        const icon   = m.category === 'supplement' ? '🌿' : '💊';
        let stockTxt = '';
        if (m.stockManaged && m.rem != null) {
          const low = m.reorder && m.rem <= m.reorder;
          stockTxt = `<div class="dstock ${low ? 'low' : 'ok'}">
            在庫: ${m.rem}${m.unit||'錠'}${low ? ' ⚠ 発注点以下' : ''}
          </div>`;
        }
        html += `
          <div class="dose-card${taken ? ' taken' : ''}">
            <div class="dose-icon ${m.category}">${icon}</div>
            <div class="dinfo">
              <div class="dname">${m.name}</div>
              <div class="ddet">${m.dosagePerTake}${m.unit||'錠'}${m.note ? ' · ' + m.note : ''}</div>
              ${stockTxt}
            </div>
            <button class="dcheck${taken ? ' taken' : overdue ? ' overdue' : ''}"
              onclick="toggleDose('${m.id}','${t}')">
              ${taken ? '✓' : ''}
            </button>
          </div>`;
      });
    });
  }
  document.getElementById('today-body').innerHTML = html;
}

function toggleDose(mid, timing) {
  const today = todayKey();
  const idx = S.records.findIndex(r =>
    r.mid === mid && r.timing === timing && r.ts.startsWith(today));
  const m = S.medicines.find(x => x.id === mid);
  if (!m) return;
  if (idx >= 0) {
    if (m.stockManaged && m.rem != null)
      m.rem = parseFloat((m.rem + m.dosagePerTake).toFixed(2));
    S.records.splice(idx, 1);
    banner('取り消しました', 'inf');
  } else {
    if (m.stockManaged && m.rem != null && m.rem > 0)
      m.rem = parseFloat((m.rem - m.dosagePerTake).toFixed(2));
    S.records.push({ id:uid(), mid, timing, ts:new Date().toISOString(), method:'manual' });
    banner(`✓ ${m.name}（${TL[timing]}）を記録`, 'ok');
    checkReorder(m);
  }
  save(); renderToday();
}

// ═══════════════════════════════
//  SCAN PAGE
// ═══════════════════════════════
function renderManual() {
  const el    = document.getElementById('manual-list');
  const today = todayKey();
  const act   = S.medicines.filter(m => m.active !== false);
  if (!act.length) {
    el.innerHTML = '<div class="empty" style="padding:20px 0"><p>薬・サプリが未登録です</p></div>';
    return;
  }
  el.innerHTML = act.map(m => m.timings.map(t => {
    const taken = isTaken(m.id, t, today);
    const icon  = m.category === 'supplement' ? '🌿' : '💊';
    return `
      <div class="dose-card${taken ? ' taken' : ''}" style="margin:0 0 8px">
        <div class="dose-icon ${m.category}">${icon}</div>
        <div class="dinfo">
          <div class="dname">${m.name}</div>
          <div class="ddet">${TL[t]} · ${m.dosagePerTake}${m.unit||'錠'}</div>
        </div>
        <button class="dcheck${taken ? ' taken' : ''}"
          onclick="manualRecord('${m.id}','${t}')">
          ${taken ? '✓' : ''}
        </button>
      </div>`;
  }).join('')).join('');
}

function manualRecord(mid, timing) {
  const today = todayKey();
  const m     = S.medicines.find(x => x.id === mid);
  if (!m) return;
  const idx = S.records.findIndex(r =>
    r.mid === mid && r.timing === timing && r.ts.startsWith(today));
  if (idx >= 0) {
    if (m.stockManaged && m.rem != null)
      m.rem = parseFloat((m.rem + m.dosagePerTake).toFixed(2));
    S.records.splice(idx, 1);
    banner('取り消しました', 'inf');
  } else {
    if (m.stockManaged && m.rem != null && m.rem > 0)
      m.rem = parseFloat((m.rem - m.dosagePerTake).toFixed(2));
    S.records.push({ id:uid(), mid, timing, ts:new Date().toISOString(), method:'manual' });
    banner(`✓ ${m.name}（${TL[timing]}）を記録`, 'ok');
    checkReorder(m);
  }
  save(); renderManual(); renderToday();
}

// ── NFC ──
let nfcReader = null;

async function startNFC() {
  if (!('NDEFReader' in window)) {
    showScanResult('ng', '⚠', 'Android Chrome が必要です',
      'Web NFC APIはAndroid Chromeのみ対応しています');
    return;
  }
  const btn = document.getElementById('nfc-btn');
  const st  = document.getElementById('nfc-status');
  try {
    nfcReader = new NDEFReader();
    await nfcReader.scan();
    btn.classList.add('scanning');
    st.textContent = '📡 待受中… タグに近づけてください';
    nfcReader.addEventListener('reading', ({ serialNumber }) => {
      handleScan(serialNumber);
    });
  } catch(e) {
    btn.classList.remove('scanning');
    st.textContent = 'ボタンを押してNFC待受を開始';
    showScanResult('ng', '❌', 'NFCエラー', e.message);
  }
}

/*
 * ★ 修正済みスキャン処理
 * 時刻でタイミングを自動判定
 */
function handleScan(tagId) {
  document.getElementById('nfc-btn').classList.remove('scanning');
  document.getElementById('nfc-status').textContent = 'ボタンを押してNFC待受を開始';

  // NFCタグ連携モード
  if (linkingNFC) {
    pendingTag = tagId;
    document.getElementById('nfc-link').classList.add('linked');
    document.getElementById('nfc-link-lbl').textContent = 'タグ連携完了';
    document.getElementById('nfc-link-st').textContent  = '…' + tagId.slice(-6);
    updateNfcUrlHint();
    linkingNFC = false;
    banner('✓ NFCタグを登録しました', 'ok');
    return;
  }

  // 薬を検索
  const med = S.medicines.find(m => m.nfcTag === tagId);
  if (!med) {
    showScanResult('ng', '❓', '未登録のタグです',
      '「くすり」タブで薬を登録してNFCタグを連携してください');
    return;
  }

  const today = todayKey();
  const h     = new Date().getHours();

  // ★ 時刻ベースでタイミング選択
  const timing = pickTimingByHour(med.timings, h, today, med.id);

  if (!timing) {
    // 全タイミング記録済み
    showScanResult('inf', '✅', `${med.name}`,
      '本日分はすべて記録済みです', false);
    return;
  }

  // 記録
  if (med.stockManaged && med.rem != null && med.rem > 0)
    med.rem = parseFloat((med.rem - med.dosagePerTake).toFixed(2));

  const rec = { id:uid(), mid:med.id, timing, ts:new Date().toISOString(), method:'nfc' };
  S.records.push(rec);
  lastScanRecord = rec;
  save();

  showScanResult('ok', '💊', `${med.name}（${TL[timing]}）を記録しました！`,
    `${med.dosagePerTake}${med.unit||'錠'}${med.stockManaged ? ' · 残り ' + med.rem + (med.unit||'錠') : ''}`,
    true);

  banner(`💊 ${med.name}（${TL[timing]}）記録完了！`, 'ok');
  checkReorder(med);
  renderManual();
  renderToday();
}

function showScanResult(type, icon, title, detail, showUndo = false) {
  const el = document.getElementById('scan-result');
  el.className = 'scan-result ' + type;
  document.getElementById('sr-icon').textContent   = icon;
  document.getElementById('sr-title').textContent  = title;
  document.getElementById('sr-detail').textContent = detail;
  document.getElementById('sr-undo').style.display = showUndo ? 'block' : 'none';
}

function undoLastScan() {
  if (!lastScanRecord) return;
  const idx = S.records.findIndex(r => r.id === lastScanRecord.id);
  if (idx < 0) { banner('すでに取り消し済みです', 'inf'); return; }
  const m = S.medicines.find(x => x.id === lastScanRecord.mid);
  if (m && m.stockManaged && m.rem != null)
    m.rem = parseFloat((m.rem + m.dosagePerTake).toFixed(2));
  S.records.splice(idx, 1);
  lastScanRecord = null;
  save();
  showScanResult('inf', '↩', '記録を取り消しました', 'スキャンし直すか手動で記録してください', false);
  banner('記録を取り消しました', 'inf');
  renderManual(); renderToday();
}

async function linkNFC() {
  if (!('NDEFReader' in window)) {
    banner('⚠ Android Chrome が必要です', 'ng'); return;
  }
  linkingNFC = true;
  banner('📡 連携するタグにタッチしてください', 'inf');
  try {
    const reader = new NDEFReader();
    await reader.scan();
    reader.addEventListener('reading', ({ serialNumber }) => {
      pendingTag = serialNumber;
      document.getElementById('nfc-link').classList.add('linked');
      document.getElementById('nfc-link-lbl').textContent = 'タグ連携完了';
      document.getElementById('nfc-link-st').textContent  = '…' + serialNumber.slice(-6);
      updateNfcUrlHint();
      linkingNFC = false;
      banner('✓ NFCタグを登録しました', 'ok');
    }, { once:true });
  } catch(e) {
    linkingNFC = false;
    banner('NFCエラー: ' + e.message, 'ng');
  }
}

/*
 * NFCタグに書き込むURL案内
 * ?nfc=タグID をURLパラメータに付けるとアプリ自動起動対応
 */
function updateNfcUrlHint() {
  const hint = document.getElementById('nfc-url-hint');
  if (!pendingTag) { hint.textContent = ''; return; }
  const base = location.href.split('?')[0];
  hint.textContent = `NFC Tools で下記URLをタグに書き込むと、タッチだけでアプリが起動します：`;
  hint.innerHTML += `<br><span style="font-family:monospace;font-size:11px;word-break:break-all;color:#0284C7">${base}?nfc=${encodeURIComponent(pendingTag)}</span>`;
}

// ═══════════════════════════════
//  MEDS PAGE
// ═══════════════════════════════
function renderMeds() {
  document.getElementById('fab').style.display = 'flex';
  const act = S.medicines.filter(m => m.active !== false);
  document.getElementById('meds-sub').textContent = `${act.length}件登録中`;

  // アラートバー
  const alerts = act.filter(m => m.stockManaged && m.rem != null && m.reorder != null && m.rem <= m.reorder);
  document.getElementById('alert-area').innerHTML = alerts.map(m => {
    const crit = m.rem <= 0;
    return `<div class="alert-bar${crit ? ' crit' : ''}" onclick="openStock('${m.id}')">
      ${crit ? '🚨' : '⚠'} <strong>${m.name}</strong> 残り${m.rem}${m.unit||'錠'}
      — ${crit ? '在庫切れ！今すぐ発注' : `発注点(${m.reorder})以下`}
    </div>`;
  }).join('');

  if (!act.length) {
    document.getElementById('mlist').innerHTML =
      `<div class="empty"><div class="empty-icon">💊</div>
       <p>まだ登録がありません<br>右下の ＋ から追加できます</p></div>`;
    return;
  }

  document.getElementById('mlist').innerHTML = act.map(m => {
    const icon  = m.category === 'supplement' ? '🌿' : '💊';
    const tTags = m.timings.map(t => `<span class="tag tag-tim">${TL[t]}</span>`).join('');
    const catTag = `<span class="tag ${m.category==='supplement'?'tag-sup':'tag-med'}">${m.category==='supplement'?'サプリ':'薬'}</span>`;
    const nfcTag = m.nfcTag ? `<span class="tag tag-nfc">NFC</span>` : '';

    let stockHtml = '';
    if (m.stockManaged) {
      const rem  = m.rem ?? 0;
      const init = m.initStock || Math.max(rem, 1);
      const pct  = Math.max(0, Math.min(100, rem / init * 100));
      const col  = m.reorder && rem <= m.reorder ? 'var(--rose)' : pct < 30 ? 'var(--amber)' : 'var(--teal)';
      const valCls = m.reorder && rem <= m.reorder ? ' danger' : '';
      stockHtml = `
        <div class="mc-stock">
          <div class="ms-row">
            <span class="ms-lbl">在庫残量</span>
            <span class="ms-val${valCls}">${rem} ${m.unit||'錠'}
              ${m.reorder ? `<span class="ms-reorder">発注点: ${m.reorder}</span>` : ''}
            </span>
          </div>
          <div class="pbar"><div class="pfill" style="width:${pct}%;background:${col}"></div></div>
          <div class="ms-btns">
            <button class="ms-btn" onclick="openStock('${m.id}')">📦 在庫管理</button>
            ${m.purchaseUrl ? `<button class="ms-btn buy" onclick="openUrl('${m.id}')">🛒 購入する</button>` : ''}
          </div>
        </div>`;
    } else if (m.purchaseUrl) {
      stockHtml = `
        <div class="mc-stock">
          <div class="ms-btns">
            <button class="ms-btn buy" onclick="openUrl('${m.id}')">🛒 購入する</button>
          </div>
        </div>`;
    }

    return `
      <div class="med-card">
        <div class="mc-main">
          <div class="mc-icon ${m.category}">${icon}</div>
          <div class="mc-body">
            <div class="mc-name">${m.name}</div>
            <div class="mc-tags">${catTag}${tTags}${nfcTag}</div>
            ${m.note ? `<div class="mc-note">${m.note}</div>` : ''}
          </div>
          <div class="mc-btns">
            <button class="icon-btn" onclick="openEdit('${m.id}')" title="編集">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/>
              </svg>
            </button>
            <button class="icon-btn del" onclick="delMed('${m.id}')" title="削除">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </div>
        </div>
        ${stockHtml}
      </div>`;
  }).join('');
}

function openUrl(mid) {
  const m = S.medicines.find(x => x.id === mid);
  if (m?.purchaseUrl) window.open(m.purchaseUrl, '_blank');
}
function delMed(id) {
  if (!confirm('削除しますか？過去の記録は残ります。')) return;
  S.medicines = S.medicines.filter(m => m.id !== id);
  save(); renderMeds();
}

// ═══════════════════════════════
//  STOCK MODAL
// ═══════════════════════════════
function openStock(mid) {
  stockMid = mid;
  const m = S.medicines.find(x => x.id === mid);
  if (!m) return;
  const unit = m.unit || '錠';
  document.getElementById('stock-title').textContent = m.name + ' — 在庫管理';
  document.getElementById('sb-val').textContent = (m.rem != null ? m.rem : '—') + ' ' + unit;
  document.getElementById('sb-sub').textContent =
    (m.reorder ? `発注点: ${m.reorder}${unit}` : '発注点: 未設定') +
    (m.initStock ? ` | 初期在庫: ${m.initStock}${unit}` : '');
  ['lot-qty','lot-note','lot-reorder','fix-qty','fix-note'].forEach(id =>
    document.getElementById(id).value = '');
  setStockTab('add');
  renderLots(mid);
  document.getElementById('ov-stock').classList.add('open');
}

function setStockTab(t) {
  stockTab = t;
  document.getElementById('stab-add').classList.toggle('on', t === 'add');
  document.getElementById('stab-fix').classList.toggle('on', t === 'fix');
  document.getElementById('sf-add').style.display = t === 'add' ? 'block' : 'none';
  document.getElementById('sf-fix').style.display = t === 'fix' ? 'block' : 'none';
}

function execLot() {
  const m = S.medicines.find(x => x.id === stockMid);
  if (!m) return;
  const qty = parseFloat(document.getElementById('lot-qty').value);
  if (!qty || qty <= 0) { banner('⚠ 追加数量を入力してください', 'ng'); return; }
  const note = document.getElementById('lot-note').value.trim();
  const nr   = document.getElementById('lot-reorder').value;
  if (nr) m.reorder = parseInt(nr);
  m.rem = (m.rem || 0) + qty;
  S.lots.push({ id:uid(), mid:stockMid, type:'add', qty, note, ts:new Date().toISOString() });
  save();
  const unit = m.unit || '錠';
  document.getElementById('sb-val').textContent = m.rem + ' ' + unit;
  document.getElementById('sb-sub').textContent = m.reorder ? `発注点: ${m.reorder}${unit}` : '発注点: 未設定';
  renderLots(stockMid);
  banner(`✓ ${qty}${unit}追加 → 残${m.rem}${unit}`, 'ok');
  renderMeds();
}

function execFix() {
  const m = S.medicines.find(x => x.id === stockMid);
  if (!m) return;
  const raw = document.getElementById('fix-qty').value;
  if (raw === '' || raw == null) { banner('⚠ 残量を入力してください', 'ng'); return; }
  const qty  = parseFloat(raw);
  const old  = m.rem;
  const note = document.getElementById('fix-note').value.trim();
  m.rem = qty;
  S.lots.push({ id:uid(), mid:stockMid, type:'fix', qty, qtyBefore:old, note, ts:new Date().toISOString() });
  save();
  const unit = m.unit || '錠';
  document.getElementById('sb-val').textContent = qty + ' ' + unit;
  renderLots(stockMid);
  banner(`✓ 在庫を${qty}${unit}に訂正しました`, 'ok');
  checkReorder(m);
  renderMeds();
}

function renderLots(mid) {
  const el   = document.getElementById('lot-hist');
  const lots = S.lots.filter(l => l.mid === mid)
    .sort((a,b) => b.ts.localeCompare(a.ts)).slice(0, 25);
  if (!lots.length) { el.innerHTML = ''; return; }
  const m = S.medicines.find(x => x.id === mid);
  const unit = m?.unit || '錠';
  el.innerHTML = `<div class="lot-hist-ttl">入荷・訂正ログ</div>` +
    lots.map(l => {
      const d = new Date(l.ts).toLocaleDateString('ja-JP', {month:'numeric', day:'numeric'});
      const t = new Date(l.ts).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
      const isAdd = l.type === 'add';
      return `<div class="lot-item">
        <span class="lot-date">${d} ${t}</span>
        <span class="lot-qty ${isAdd ? 'add' : 'fix'}">${isAdd ? '+' + l.qty : '→' + l.qty}${unit}</span>
        <span class="lot-note">${l.note || ''}</span>
      </div>`;
    }).join('');
}

// ═══════════════════════════════
//  REORDER CHECK
// ═══════════════════════════════
function checkReorder(m) {
  if (!m.stockManaged || m.rem == null || m.reorder == null) return;
  const unit = m.unit || '錠';
  if (m.rem <= 0) {
    banner(`🚨 ${m.name} 在庫切れ！発注してください`, 'warn');
    pushNotif(`🚨 ${m.name} 在庫切れ`, `残量0${unit} — 今すぐ発注が必要です`, 'zero-' + m.id);
  } else if (m.rem <= m.reorder) {
    banner(`⚠ ${m.name} 発注点以下（残${m.rem}${unit}）`, 'warn');
    pushNotif(`⚠ ${m.name} 残量わずか`, `残り${m.rem}${unit} — 発注点(${m.reorder})以下`, 'ro-' + m.id);
  }
}

//  HISTORY
// ═══════════════════════════════
function renderHistory() {
  const el = document.getElementById('hlist');
  const all = [
    ...S.records.map(r => ({...r, etype:'dose'})),
    ...S.lots.map(l    => ({...l, etype:'lot'}))
  ].sort((a,b) => b.ts.localeCompare(a.ts));

  document.getElementById('hist-sub').textContent =
    `服薬 ${S.records.length}件 / 在庫操作 ${S.lots.length}件`;

  if (!all.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>まだ記録がありません</p></div>`;
    return;
  }

  const grouped = {};
  all.forEach(e => {
    const d = e.ts.slice(0, 10);
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(e);
  });

  const colorMap = {
    medicine: 'var(--primary)',
    supplement: 'var(--teal)',
    lot: 'var(--amber)',
    fix: 'var(--rose)',
  };
  const badgeMap = {
    manual: { cls:'', bg:'var(--primary-dim)', col:'var(--primary-d)', lbl:'手動' },
    nfc:    { cls:'', bg:'var(--teal-dim)',    col:'var(--teal)',       lbl:'NFC' },
    lot:    { cls:'', bg:'var(--amber-dim)',   col:'#92400E',           lbl:'入荷' },
    fix:    { cls:'', bg:'var(--rose-dim)',    col:'var(--rose)',        lbl:'訂正' },
  };

  el.innerHTML = Object.entries(grouped).slice(0, 60).map(([date, evts]) => {
    const d   = new Date(date + 'T00:00:00');
    const lbl = d.toLocaleDateString('ja-JP', {month:'long', day:'numeric', weekday:'short'});
    return `<div class="h-day">${lbl}</div>` + evts.map(e => {
      const m = S.medicines.find(x => x.id === e.mid);
      if (!m) return '';
      const icon = m.category === 'supplement' ? '🌿' : '💊';
      const time = new Date(e.ts).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});

      if (e.etype === 'dose') {
        const b = badgeMap[e.method] || badgeMap.manual;
        return `<div class="h-item">
          <div class="h-dot" style="background:${colorMap[m.category]}"></div>
          <div class="h-info">
            <div class="h-name">${icon} ${m.name}</div>
            <div class="h-meta">${TL[e.timing]||e.timing} · ${time} · ${m.dosagePerTake}${m.unit||'錠'}</div>
          </div>
          <div class="h-badge" style="background:${b.bg};color:${b.col}">${b.lbl}</div>
        </div>`;
      } else {
        const isAdd = e.type === 'add';
        const b = isAdd ? badgeMap.lot : badgeMap.fix;
        return `<div class="h-item">
          <div class="h-dot" style="background:${isAdd ? colorMap.lot : colorMap.fix}"></div>
          <div class="h-info">
            <div class="h-name">${icon} ${m.name}</div>
            <div class="h-meta">${isAdd ? `＋${e.qty}${m.unit||'錠'} 入荷` : `在庫訂正 → ${e.qty}${m.unit||'錠'}`} · ${time}${e.note ? ' · ' + e.note : ''}</div>
          </div>
          <div class="h-badge" style="background:${b.bg};color:${b.col}">${b.lbl}</div>
        </div>`;
      }
    }).join('');
  }).join('');
}

  ['in-name','in-note','in-init','in-reorder','in-url'].forEach(id =>
    document.getElementById(id).value = '');

  document.getElementById('in-unit').value = '錠';
  document.querySelectorAll('.t-chip').forEach(c => c.classList.remove('on'));
  setType('medicine');
  useStock = false;
  document.getElementById('tog-stock').classList.remove('on');
  document.getElementById('stock-setup').style.display = 'none';
  document.getElementById('nfc-link').classList.remove('linked');
  document.getElementById('nfc-link-lbl').textContent = 'タグをタッチして連携';
  document.getElementById('nfc-link-st').textContent  = '未連携';
  document.getElementById('nfc-url-hint').innerHTML   = '';
}

function openAdd() {
  resetMainModal();
  document.getElementById('main-title').textContent = '薬・サプリを追加';
  document.getElementById('ov-main').classList.add('open');
}

function openEdit(id) {
  const m = S.medicines.find(x => x.id === id);
  if (!m) return;
  resetMainModal();
  editId = id; pendingTag = m.nfcTag || null;
  document.getElementById('main-title').textContent = '編集';
  document.getElementById('in-name').value    = m.name;
  document.getElementById('in-dose').value    = m.dosagePerTake;
  document.getElementById('in-unit').value    = m.unit || '錠';
  document.getElementById('in-note').value    = m.note || '';
  document.getElementById('in-init').value    = m.initStock || '';
  document.getElementById('in-reorder').value = m.reorder || '';
  document.getElementById('in-url').value     = m.purchaseUrl || '';
  setType(m.category);
  m.timings.forEach(t => {
    const c = document.querySelector(`.t-chip[data-t="${t}"]`);
    if (c) c.classList.add('on');

    document.getElementById('nfc-link-lbl').textContent = 'タグ連携済み';

function closeOv(name) {

}

function setType(t) {
  curType = t;
  document.getElementById('ty-med').className = 'type-chip medicine' + (t === 'medicine' ? ' on' : '');
  document.getElementById('ty-sup').className = 'type-chip supplement' + (t === 'supplement' ? ' on' : '');
}
function togT(btn) { btn.classList.toggle('on'); }
function togStock() {
  useStock = !useStock;
  document.getElementById('tog-stock').classList.toggle('on', useStock);
  document.getElementById('stock-setup').style.display = useStock ? 'block' : 'none';
}

function saveMed() {
  const name = document.getElementById('in-name').value.trim();
  if (!name) { banner('⚠ 名前を入力してください', 'ng'); return; }
  const timings = [...document.querySelectorAll('.t-chip.on')].map(c => c.dataset.t);
  if (!timings.length) { banner('⚠ タイミングを選択してください', 'ng'); return; }
  const dosagePerTake = parseFloat(document.getElementById('in-dose').value) || 1;
  const unit          = document.getElementById('in-unit').value;
  const note          = document.getElementById('in-note').value.trim();
  const initRaw       = document.getElementById('in-init').value;
  const reorderRaw    = document.getElementById('in-reorder').value;
  const urlRaw        = document.getElementById('in-url').value.trim();
  const initStock     = useStock && initRaw ? parseInt(initRaw) : null;
  const reorder       = useStock && reorderRaw ? parseInt(reorderRaw) : null;

  if (editId) {
    const m = S.medicines.find(x => x.id === editId);
    if (m) {
      const prevInit = m.initStock;
      Object.assign(m, {
        name, category:curType, timings, dosagePerTake, unit, note,
        stockManaged:useStock, reorder,
        purchaseUrl:urlRaw || null, nfcTag:pendingTag,
        initStock: initStock ?? m.initStock,
        rem: (initStock && initStock !== prevInit) ? initStock : m.rem,
      });
    }
    banner('✓ 更新しました', 'ok');
  } else {
    S.medicines.push({
      id:uid(), nfcTag:pendingTag, name, category:curType,
      timings, dosagePerTake, unit, note,
      stockManaged:useStock, initStock, rem:initStock, reorder,
      purchaseUrl:urlRaw || null,
      startDate:todayKey(), active:true
    });
    banner(`✓ ${name} を追加しました`, 'ok');
  }
  save(); closeOv('main'); renderMeds(); renderToday();
}

// ═══════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════
function banner(msg, type) {
  const el = document.getElementById('banner');
  el.textContent = msg; el.className = 'banner ' + type;
  if (bannerTimer) clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => el.className = 'banner', 3500);
}

async function reqNotif() {
  if ('Notification' in window && Notification.permission === 'default')
    await Notification.requestPermission();
}

function pushNotif(title, body, tag) {
  if ('Notification' in window && Notification.permission === 'granted')
    new Notification(title, { body, tag });
}

function checkMissed() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now   = new Date();
  const h     = now.getHours();
  const today = todayKey();
  S.medicines.filter(m => m.active !== false).forEach(m => {
    m.timings.forEach(t => {
      if (h >= TW[t][1] && !isTaken(m.id, t, today))
        pushNotif('💊 飲み忘れ注意！',
          `${m.name}（${TL[t]}）がまだ記録されていません`,
          m.id + '-' + t + '-' + today);
    });
    checkReorder(m);
  });
}

// ═══════════════════════════════
//  URL PARAMETER HANDLING
//  ?nfc=タグID → 自動スキャン処理
// ═══════════════════════════════
function handleUrlParams() {
  const params = new URLSearchParams(location.search);
  const tagId  = params.get('nfc');
  if (!tagId) return;

  // スキャンページに移動
  const scanBtn = document.querySelector('.nb:nth-child(2)');
  showPage('scan', scanBtn);

  // 少し待ってから処理（ページ表示後）
  setTimeout(() => {
    handleScan(decodeURIComponent(tagId));
  }, 300);
}

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
load();
renderToday();
document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
document.getElementById('fab').style.display = 'none';
reqNotif();
handleUrlParams();
setInterval(checkMissed, 10 * 60 * 1000);
</script>
