<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>くすりログ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F0F4FF; --card:#FFFFFF; --primary:#3B5BDB; --primary-l:#748FFC;
  --primary-dim:#E7EBFF; --accent:#FF922B; --accent-dim:#FFF4E6;
  --success:#37B24D; --success-dim:#EBFBEE; --danger:#F03E3E;
  --danger-dim:#FFF5F5; --text:#1E1B4B; --text2:#6B7280;
  --border:#E5E7EB; --shadow:0 2px 12px rgba(59,91,219,.09);
  --shadow-lg:0 8px 32px rgba(59,91,219,.16);
  --r:16px; --rs:10px; --nav:72px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:var(--nav);background:var(--card);
  display:flex;border-top:1px solid var(--border);z-index:100;
  box-shadow:0 -4px 20px rgba(0,0,0,.06);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;background:none;border:none;cursor:pointer;
  color:var(--text2);font-size:10px;font-family:inherit;font-weight:600;transition:color .2s;}
.nb.active{color:var(--primary);}
.nb svg{width:22px;height:22px;}
.page{display:none;padding-bottom:calc(var(--nav)+16px);min-height:100vh;}
.page.active{display:block;}
.ph{background:var(--card);padding:20px 20px 14px;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;}
.ph h1{font-size:22px;font-weight:900;}
.ph .sub{font-size:13px;color:var(--text2);margin-top:2px;}
/* TODAY */
.today-hero{margin:16px;padding:18px 20px;
  background:linear-gradient(135deg,var(--primary),var(--primary-l));
  border-radius:var(--r);color:white;display:flex;justify-content:space-between;align-items:center;}
.hero-l .lbl{font-size:12px;opacity:.8;}
.hero-l .cnt{font-size:38px;font-weight:900;line-height:1;}
.hero-ring{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hero-pct{font-size:22px;font-weight:900;}
.hero-pct-l{font-size:10px;opacity:.8;}
.tsec{margin:0 16px 14px;}
.tsec-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.tsec-title::before{content:'';width:3px;height:14px;background:var(--primary);border-radius:2px;}
.dose-card{background:var(--card);border-radius:var(--rs);padding:13px 14px;
  margin-bottom:8px;display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);transition:opacity .3s;}
.dose-card.taken{opacity:.55;}
.di{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;}
.di.medicine{background:var(--primary-dim);}
.di.supplement{background:var(--success-dim);}
.dinfo{flex:1;}
.dname{font-size:15px;font-weight:700;}
.ddet{font-size:12px;color:var(--text2);margin-top:2px;}
.dstatus{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;background:none;font-size:14px;font-weight:700;
  transition:all .2s;color:transparent;}
.dstatus.taken{background:var(--success);border-color:var(--success);color:white;}
.dstatus.overdue{border-color:var(--danger);color:var(--danger);}
/* SCAN */
.scan-wrap{padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:20px;}
.nfc-btn{width:170px;height:170px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary-l));
  border:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:white;font-family:inherit;font-size:15px;font-weight:700;
  box-shadow:0 8px 32px rgba(59,91,219,.35);transition:transform .15s;
  position:relative;overflow:hidden;}
.nfc-btn:active{transform:scale(.95);}
.nfc-btn.scanning::before,.nfc-btn.scanning::after{
  content:'';position:absolute;border-radius:50%;
  border:2px solid rgba(255,255,255,.4);animation:rip 1.8s infinite;}
.nfc-btn.scanning::after{animation-delay:.6s;}
@keyframes rip{0%{width:50%;height:50%;opacity:1;top:25%;left:25%;}
  100%{width:150%;height:150%;opacity:0;top:-25%;left:-25%;}}
.scan-res{width:100%;padding:14px 16px;border-radius:var(--r);
  text-align:center;font-weight:700;font-size:14px;display:none;}
.scan-res.ok{background:var(--success-dim);color:var(--success);display:block;}
.scan-res.ng{background:var(--danger-dim);color:var(--danger);display:block;}
.scan-res.inf{background:var(--primary-dim);color:var(--primary);display:block;}
/* MED LIST */
.mlist{padding:16px;display:flex;flex-direction:column;gap:12px;}
.mitem{background:var(--card);border-radius:var(--r);padding:16px;
  box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;}
.mitem-top{display:flex;gap:12px;align-items:flex-start;}
.micon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:24px;flex-shrink:0;}
.micon.medicine{background:var(--primary-dim);}
.micon.supplement{background:var(--success-dim);}
.mbody{flex:1;min-width:0;}
.mname{font-size:16px;font-weight:700;}
.mtags{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0;}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px;}
.tag.p{background:var(--primary-dim);color:var(--primary);}
.tag.s{background:var(--success-dim);color:var(--success);}
.tag.a{background:var(--accent-dim);color:var(--accent);}
.macts{display:flex;gap:6px;flex-shrink:0;}
.ibtn{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .15s;}
.ibtn:hover{background:var(--primary-dim);color:var(--primary);}
.ibtn.del:hover{background:var(--danger-dim);color:var(--danger);}
/* STOCK SECTION */
.stock-sec{border-top:1px solid var(--border);padding-top:10px;}
.stock-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.stock-lbl{font-size:12px;color:var(--text2);flex:1;}
.stock-nums{font-size:13px;font-weight:700;}
.reorder-badge{font-size:11px;color:var(--accent);margin-left:6px;}
.rem-danger{color:var(--danger);}
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.pfill{height:100%;border-radius:3px;transition:width .4s;}
.stock-btns{display:flex;gap:8px;margin-top:8px;}
.sbtn{flex:1;padding:8px 0;border-radius:var(--rs);border:1.5px solid var(--border);
  background:var(--bg);cursor:pointer;font-family:inherit;font-size:12px;
  font-weight:700;color:var(--text2);transition:all .15s;}
.sbtn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);}
.sbtn.buy{background:var(--success-dim);color:var(--success);border-color:var(--success);}
.sbtn.buy:hover{background:var(--success);color:white;}
.fab{position:fixed;bottom:calc(var(--nav)+16px);right:max(16px,calc(50vw - 199px));
  width:56px;height:56px;border-radius:50%;background:var(--primary);color:white;
  border:none;cursor:pointer;display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(59,91,219,.4);z-index:90;font-size:26px;transition:transform .15s;}
.fab:active{transform:scale(.94);}
/* HISTORY */
.hlist{padding:16px;display:flex;flex-direction:column;gap:6px;}
.hday{font-size:12px;font-weight:700;color:var(--text2);padding:10px 0 4px;}
.hitem{background:var(--card);border-radius:var(--rs);padding:12px 14px;
  display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.hdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.hdot.medicine{background:var(--primary);}
.hdot.supplement{background:var(--success);}
.hdot.lot{background:var(--accent);}
.hdot.fix{background:var(--danger);}
.hinfo{flex:1;}
.hname{font-size:14px;font-weight:600;}
.hmeta{font-size:12px;color:var(--text2);}
.hbadge{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:700;white-space:nowrap;}
.hbadge.dose{background:var(--primary-dim);color:var(--primary);}
.hbadge.nfc{background:var(--success-dim);color:var(--success);}
.hbadge.lot{background:var(--accent-dim);color:var(--accent);}
.hbadge.fix{background:var(--danger-dim);color:var(--danger);}
/* ALERTS */
.alert-bar{margin:0 16px 10px;padding:12px 16px;border-radius:var(--rs);
  display:flex;align-items:center;gap:10px;
  background:var(--accent-dim);border-left:4px solid var(--accent);
  font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;}
.alert-bar.crit{background:var(--danger-dim);border-color:var(--danger);color:var(--danger);}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:none;align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:430px;
  max-height:92vh;overflow-y:auto;padding:20px 20px 32px;}
.mhandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.mtitle{font-size:18px;font-weight:900;margin-bottom:18px;}
.fg{margin-bottom:14px;}
.fl{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;}
.fi,.fs{width:100%;padding:12px 14px;border:1.5px solid var(--border);
  border-radius:var(--rs);font-size:15px;font-family:inherit;color:var(--text);
  background:var(--bg);outline:none;transition:border-color .2s;}
.fi:focus,.fs:focus{border-color:var(--primary);}
.fi.sm{font-size:13px;}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.tchip{padding:10px 0;border-radius:var(--rs);border:1.5px solid var(--border);
  background:var(--card);cursor:pointer;font-family:inherit;font-size:13px;
  font-weight:600;color:var(--text2);text-align:center;transition:all .15s;}
.tchip.on{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tychip{padding:14px 0;border-radius:var(--rs);border:1.5px solid var(--border);
  background:var(--card);cursor:pointer;font-family:inherit;font-size:14px;
  font-weight:600;color:var(--text2);text-align:center;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:4px;}
.tychip span{font-size:22px;}
.tychip.on.medicine{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);}
.tychip.on.supplement{background:var(--success-dim);border-color:var(--success);color:var(--success);}
.togrow{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;background:var(--bg);border-radius:var(--rs);cursor:pointer;}
.togrow-lbl{font-size:14px;font-weight:600;}
.tog{width:48px;height:26px;background:var(--border);border-radius:13px;
  position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0;}
.tog.on{background:var(--primary);}
.tog::after{content:'';position:absolute;width:20px;height:20px;background:white;
  border-radius:50%;top:3px;left:3px;transition:transform .2s;
  box-shadow:0 1px 4px rgba(0,0,0,.2);}
.tog.on::after{transform:translateX(22px);}
.row2{display:flex;gap:12px;}
.row2 .fg{flex:1;}
.nfc-row{display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--bg);border-radius:var(--rs);cursor:pointer;
  border:1.5px solid var(--border);transition:all .2s;}
.nfc-row.linked{border-color:var(--success);background:var(--success-dim);}
.nfc-row-lbl{font-size:14px;font-weight:600;flex:1;}
.nfc-row-st{font-size:12px;color:var(--text2);}
.btn{width:100%;padding:14px;border-radius:var(--rs);border:none;
  font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn:active{opacity:.85;}
.btn-p{background:var(--primary);color:white;}
.btn-o{background:var(--bg);color:var(--text2);border:1.5px solid var(--border);margin-top:8px;}
/* STOCK MODAL */
.stab-row{display:flex;gap:8px;margin-bottom:16px;}
.stab{flex:1;padding:10px;border-radius:var(--rs);border:1.5px solid var(--border);
  background:var(--bg);cursor:pointer;font-family:inherit;font-size:13px;
  font-weight:700;color:var(--text2);text-align:center;transition:all .15s;}
.stab.on{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);}
.cur-stock-box{background:var(--bg);border-radius:var(--rs);padding:14px 16px;margin-bottom:18px;}
.cur-stock-lbl{font-size:12px;color:var(--text2);margin-bottom:4px;}
.cur-stock-val{font-size:28px;font-weight:900;}
.cur-stock-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.lot-history{margin-top:18px;border-top:1px solid var(--border);padding-top:14px;}
.lot-history-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.lot-item{display:flex;align-items:center;gap:8px;padding:8px 0;
  border-bottom:1px solid var(--border);font-size:13px;}
.lot-item:last-child{border-bottom:none;}
.lot-date{color:var(--text2);flex-shrink:0;font-size:12px;width:88px;}
.lot-qty{font-weight:700;flex-shrink:0;min-width:56px;}
.lot-qty.add{color:var(--success);}
.lot-qty.fix{color:var(--danger);}
.lot-note{color:var(--text2);font-size:12px;flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--text2);}
.empty .ei{font-size:48px;margin-bottom:12px;}
.empty p{font-size:14px;line-height:1.7;}
/* BANNER */
.banner{position:fixed;top:16px;left:50%;transform:translateX(-50%);
  max-width:390px;width:calc(100% - 32px);padding:13px 18px;border-radius:var(--r);
  font-size:14px;font-weight:700;z-index:400;
  display:none;align-items:center;gap:10px;box-shadow:var(--shadow-lg);}
.banner.ok{background:var(--success);color:white;display:flex;animation:sld .3s ease;}
.banner.ng{background:var(--danger);color:white;display:flex;animation:sld .3s ease;}
.banner.inf{background:var(--primary);color:white;display:flex;animation:sld .3s ease;}
.banner.warn{background:var(--accent);color:white;display:flex;animation:sld .3s ease;}
@keyframes sld{from{opacity:0;transform:translate(-50%,-16px);}to{opacity:1;transform:translate(-50%,0);}}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<!-- TODAY -->
<div id="pg-today" class="page active">
  <div class="ph"><h1>今日の服薬</h1><div class="sub" id="today-date"></div></div>
  <div id="today-body"></div>
</div>

<!-- SCAN -->
<div id="pg-scan" class="page">
  <div class="ph"><h1>NFCスキャン</h1><div class="sub">タグにスマホをタッチ → 自動記録</div></div>
  <div class="scan-wrap">
    <button class="nfc-btn" id="nfc-btn" onclick="startNFC()">
      <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 12c0-4.4-3.6-8-8-8s-8 3.6-8 8 3.6 8 8 8"/>
        <path d="M15 12c0-1.7-1.3-3-3-3s-3 1.3-3 3 1.3 3 3 3"/>
      </svg>タッチして<br>スキャン
    </button>
    <div id="scan-res" class="scan-res"></div>
    <div style="width:100%">
      <div class="tsec-title" style="margin-bottom:10px">手動でも記録できます</div>
      <div id="manual-list"></div>
    </div>
  </div>
</div>

<!-- MEDS -->
<div id="pg-meds" class="page">
  <div class="ph"><h1>薬・サプリ管理</h1><div class="sub" id="meds-sub"></div></div>
  <div id="alert-area"></div>
  <div id="mlist" class="mlist"></div>
  <button class="fab" id="fab" onclick="openAdd()">＋</button>
</div>

<!-- HISTORY -->
<div id="pg-history" class="page">
  <div class="ph"><h1>服薬・在庫履歴</h1><div class="sub" id="hist-sub"></div></div>
  <div id="hlist" class="hlist"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nb active" onclick="showPage('today',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>今日
  </button>
  <button class="nb" onclick="showPage('scan',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="7" width="3" height="10" rx="1"/><rect x="7" y="4" width="2" height="16" rx="1"/>
      <rect x="12" y="7" width="3" height="10" rx="1"/><rect x="17" y="4" width="2" height="16" rx="1"/>
    </svg>スキャン
  </button>
  <button class="nb" onclick="showPage('meds',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 14c1.5-1.5 3-3.2 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.8 0-3 .5-4.5 2C10.5 3.5 9.3 3 7.5 3A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4 3 5.5l7 7z"/>
    </svg>くすり
  </button>
  <button class="nb" onclick="showPage('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>履歴
  </button>
</nav>

<!-- ══ 薬登録/編集 MODAL ══ -->
<div class="ov" id="ov-main" onclick="ovClose('main',event)">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="main-title">追加</div>
    <div class="fg">
      <label class="fl">種類</label>
      <div class="type-grid">
        <button class="tychip medicine on" id="ty-med" onclick="setType('medicine')"><span>💊</span>薬</button>
        <button class="tychip supplement"  id="ty-sup" onclick="setType('supplement')"><span>🌿</span>サプリメント</button>
      </div>
    </div>
    <div class="fg">
      <label class="fl">名前</label>
      <input type="text" class="fi" id="in-name" placeholder="例：ビタミンC、降圧薬">
    </div>
    <div class="fg">
      <label class="fl">服用タイミング（複数可）</label>
      <div class="tgrid">
        <button class="tchip" data-t="morning"       onclick="togT(this)">朝</button>
        <button class="tchip" data-t="noon"          onclick="togT(this)">昼</button>
        <button class="tchip" data-t="evening"       onclick="togT(this)">夜</button>
        <button class="tchip" data-t="before_meal"   onclick="togT(this)">食前</button>
        <button class="tchip" data-t="after_meal"    onclick="togT(this)">食後</button>
        <button class="tchip" data-t="between_meals" onclick="togT(this)">食間</button>
      </div>
    </div>
    <div class="row2">
      <div class="fg">
        <label class="fl">1回の量</label>
        <input type="number" class="fi" id="in-dose" value="1" min="0.5" step="0.5">
      </div>
      <div class="fg">
        <label class="fl">単位</label>
        <select class="fs" id="in-unit">
          <option value="錠">錠</option>
          <option value="粒">粒</option>
          <option value="包">包</option>
          <option value="ml">ml</option>
          <option value="g">g</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <div class="togrow" onclick="togStock()">
        <span class="togrow-lbl">在庫数を管理する</span>
        <button class="tog" id="tog-stock" type="button"></button>
      </div>
    </div>
    <div id="stock-setup" style="display:none">
      <div class="row2">
        <div class="fg">
          <label class="fl">初期在庫数</label>
          <input type="number" class="fi" id="in-init" placeholder="例：30" min="1">
        </div>
        <div class="fg">
          <label class="fl">発注点（残量アラート）</label>
          <input type="number" class="fi" id="in-reorder" placeholder="例：7" min="1">
        </div>
      </div>
      <p style="font-size:11px;color:var(--accent);margin:-8px 0 14px;font-weight:600">

<div class="banner" id="banner"></div>

<script>
const TL={morning:'朝',noon:'昼',evening:'夜',before_meal:'食前',after_meal:'食後',between_meals:'食間'};
const TW={morning:[6,10],noon:[10,14],evening:[17,23],before_meal:[6,23],after_meal:[6,23],between_meals:[6,23]};
const TORDER=['morning','noon','evening','before_meal','after_meal','between_meals'];

let S={medicines:[],records:[],lots:[]};
let editId=null,stockMid=null,pendingTag=null,linkingNFC=false;
let curType='medicine',useStock=false,stockTab='add',bannerTimer=null;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const todayKey=()=>new Date().toISOString().slice(0,10);
const save=()=>localStorage.setItem('kl_v3',JSON.stringify(S));
function load(){
  try{const r=localStorage.getItem('kl_v3');if(r)S=JSON.parse(r);}catch(e){}
  if(!S.lots)S.lots=[];
}
const isTaken=(mid,t,date)=>S.records.some(r=>r.mid===mid&&r.timing===t&&r.ts.startsWith(date));

// ── NAV ──
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('fab').style.display=name==='meds'?'flex':'none';
  if(name==='today')renderToday();
  if(name==='scan')renderManual();
  if(name==='meds')renderMeds();
  if(name==='history')renderHistory();
}

// ── TODAY ──
function renderToday(){
  const now=new Date(),h=now.getHours(),today=todayKey();
  document.getElementById('today-date').textContent=
    now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const act=S.medicines.filter(m=>m.active!==false);
  let total=0,done=0;
  act.forEach(m=>m.timings.forEach(t=>{total++;if(isTaken(m.id,t,today))done++;}));
  const pct=total>0?Math.round(done/total*100):0;
  let html=`<div class="today-hero">
    <div class="hero-l">
      <div class="lbl">本日の進捗</div>
      <div class="cnt">${done}<span style="font-size:18px;font-weight:500;opacity:.7"> / ${total}</span></div>
      <div class="lbl">服用済み</div>
    </div>
    <div class="hero-ring"><div class="hero-pct">${pct}%</div><div class="hero-pct-l">達成率</div></div>
  </div>`;
  if(!act.length){
    html+=`<div class="empty"><div class="ei">💊</div><p>薬・サプリが未登録です<br>「くすり」タブから追加してください</p></div>`;
  } else {
    const groups={};
    act.forEach(m=>m.timings.forEach(t=>{if(!groups[t])groups[t]=[];groups[t].push(m);}));
    TORDER.forEach(t=>{
      if(!groups[t])return;
      html+=`<div class="tsec"><div class="tsec-title">${TL[t]}</div>`;
      groups[t].forEach(m=>{
        const taken=isTaken(m.id,t,today),over=!taken&&h>=TW[t][1];
        const icon=m.category==='supplement'?'🌿':'💊';
        html+=`<div class="dose-card${taken?' taken':''}">
          <div class="di ${m.category}">${icon}</div>
          <div class="dinfo">
            <div class="dname">${m.name}</div>
            <div class="ddet">${m.dosagePerTake}${m.unit||'錠'}${m.note?' · '+m.note:''}</div>
          </div>
          <button class="dstatus${taken?' taken':over?' overdue':''}" onclick="toggleDose('${m.id}','${t}')">
            ${taken?'✓':over?'!':''}
          </button>
        </div>`;
      });
      html+=`</div>`;
    });
  }
  document.getElementById('today-body').innerHTML=html;
}

function toggleDose(mid,timing){
  const today=todayKey();
  const idx=S.records.findIndex(r=>r.mid===mid&&r.timing===timing&&r.ts.startsWith(today));
  const m=S.medicines.find(x=>x.id===mid);
  if(!m)return;
  if(idx>=0){
    if(m.stockManaged&&m.rem!=null)m.rem=parseFloat((m.rem+m.dosagePerTake).toFixed(2));
    S.records.splice(idx,1);
    banner('取り消しました','inf');
  } else {
    if(m.stockManaged&&m.rem!=null&&m.rem>0)m.rem=parseFloat((m.rem-m.dosagePerTake).toFixed(2));
    S.records.push({id:uid(),mid,timing,ts:new Date().toISOString(),method:'manual'});
    banner(`✓ ${m.name}（${TL[timing]}）を記録`,'ok');
    checkReorder(m);
  }
  save();renderToday();
}

// ── SCAN ──
function renderManual(){
  const el=document.getElementById('manual-list');
  const today=todayKey();
  const act=S.medicines.filter(m=>m.active!==false);
  if(!act.length){el.innerHTML='<div class="empty" style="padding:20px"><p>薬・サプリが未登録です</p></div>';return;}
  el.innerHTML=act.map(m=>m.timings.map(t=>{
    const taken=isTaken(m.id,t,today),icon=m.category==='supplement'?'🌿':'💊';
    return `<div class="dose-card${taken?' taken':''}" style="margin-bottom:8px">
      <div class="di ${m.category}">${icon}</div>
      <div class="dinfo"><div class="dname">${m.name}</div>
        <div class="ddet">${TL[t]} · ${m.dosagePerTake}${m.unit||'錠'}</div></div>
      <button class="dstatus${taken?' taken':''}" onclick="toggleDose('${m.id}','${t}');renderManual()">${taken?'✓':''}</button>
    </div>`;
  }).join('')).join('');
}

async function startNFC(){
  if(!('NDEFReader' in window)){banner('⚠ Android Chrome が必要です','ng');return;}
  const btn=document.getElementById('nfc-btn'),res=document.getElementById('scan-res');
  try{
    const reader=new NDEFReader();
    await reader.scan();
    btn.classList.add('scanning');
    res.className='scan-res inf';res.textContent='📡 スキャン中… タグに近づけてください';
    reader.addEventListener('reading',({serialNumber})=>{
      btn.classList.remove('scanning');handleScan(serialNumber,res);
    });
  }catch(e){btn.classList.remove('scanning');banner('NFCエラー: '+e.message,'ng');}
}

function handleScan(tagId,resEl){
  if(linkingNFC){
    pendingTag=tagId;
    document.getElementById('nfc-row').classList.add('linked');
    document.getElementById('nfc-lbl').textContent='タグ連携完了';
    document.getElementById('nfc-st').textContent='…'+tagId.slice(-6);
    linkingNFC=false;banner('✓ NFCタグを登録しました','ok');return;
  }
  const med=S.medicines.find(m=>m.nfcTag===tagId);
  if(!med){
    if(resEl){resEl.className='scan-res ng';resEl.textContent='❓ 未登録タグです。「くすり」タブで連携してください。';}
    return;
  }
  const today=todayKey();
  const pending=med.timings.filter(t=>!isTaken(med.id,t,today));
  if(!pending.length){
    if(resEl){resEl.className='scan-res inf';resEl.textContent=`✅ ${med.name} は本日分すべて記録済みです`;}
    return;
  }
  const t=pending[0];
  if(med.stockManaged&&med.rem!=null&&med.rem>0)
    med.rem=parseFloat((med.rem-med.dosagePerTake).toFixed(2));
  S.records.push({id:uid(),mid:med.id,timing:t,ts:new Date().toISOString(),method:'nfc'});
  save();
  if(resEl){resEl.className='scan-res ok';resEl.textContent=`✅ ${med.name}（${TL[t]}）を記録しました！`;}
  banner(`💊 ${med.name} 服用記録！`,'ok');
  checkReorder(med);renderToday();
}

async function linkNFC(){
  if(!('NDEFReader' in window)){banner('⚠ Android Chrome が必要です','ng');return;}
  linkingNFC=true;banner('📡 連携するタグにタッチしてください','inf');
  try{
    const reader=new NDEFReader();await reader.scan();
    reader.addEventListener('reading',({serialNumber})=>{
      pendingTag=serialNumber;
      document.getElementById('nfc-row').classList.add('linked');
      document.getElementById('nfc-lbl').textContent='タグ連携完了';
      document.getElementById('nfc-st').textContent='…'+serialNumber.slice(-6);
      linkingNFC=false;banner('✓ NFCタグを登録しました','ok');
    },{once:true});
  }catch(e){linkingNFC=false;banner('NFCエラー: '+e.message,'ng');}
}

// ── MEDS PAGE ──
function renderMeds(){
  document.getElementById('fab').style.display='flex';
  const act=S.medicines.filter(m=>m.active!==false);
  document.getElementById('meds-sub').textContent=`${act.length}件登録中`;
  // alerts
  const alerts=act.filter(m=>m.stockManaged&&m.rem!=null&&m.reorder!=null&&m.rem<=m.reorder);
  document.getElementById('alert-area').innerHTML=alerts.map(m=>{
    const crit=m.rem<=0;
    return `<div class="alert-bar${crit?' crit':''}" onclick="openStock('${m.id}')">
      ${crit?'🚨':'⚠'} <strong>${m.name}</strong> 残り${m.rem}${m.unit||'錠'}
      — ${crit?'在庫切れ！今すぐ発注を':`発注点(${m.reorder})以下です`}
    </div>`;
  }).join('');
  if(!act.length){
    document.getElementById('mlist').innerHTML=
      `<div class="empty"><div class="ei">💊</div><p>まだ登録がありません<br>右下の ＋ から追加できます</p></div>`;
    return;
  }
  document.getElementById('mlist').innerHTML=act.map(m=>{
    const icon=m.category==='supplement'?'🌿':'💊';
    const tTags=m.timings.map(t=>`<span class="tag p">${TL[t]}</span>`).join('');
    const catTag=`<span class="tag ${m.category==='supplement'?'s':'a'}">${m.category==='supplement'?'サプリ':'薬'}</span>`;
    const nfcTag=m.nfcTag?`<span class="tag p">NFC</span>`:'';
    let stockHtml='';
    if(m.stockManaged){
      const rem=m.rem??0,init=m.initStock||Math.max(rem,1);
      const pct=Math.max(0,Math.min(100,(rem/init)*100));
      const col=m.reorder&&rem<=m.reorder?'var(--danger)':pct<30?'var(--accent)':'var(--primary)';
      const remCls=m.reorder&&rem<=m.reorder?' rem-danger':'';
      stockHtml=`<div class="stock-sec">
        <div class="stock-row">
          <span class="stock-lbl">在庫残量</span>
          <span class="stock-nums">
            <span class="${remCls}">${rem} ${m.unit||'錠'}</span>
            ${m.reorder?`<span class="reorder-badge">発注点: ${m.reorder}</span>`:''}
          </span>
        </div>
        <div class="pbar"><div class="pfill" style="width:${pct}%;background:${col}"></div></div>
        <div class="stock-btns">
          <button class="sbtn" onclick="openStock('${m.id}')">📦 在庫管理</button>
          ${m.purchaseUrl?`<button class="sbtn buy" onclick="openUrl('${m.id}')">🛒 購入する</button>`:''}
        </div>
      </div>`;
    } else if(m.purchaseUrl){
      stockHtml=`<div class="stock-sec">
        <div class="stock-btns">
          <button class="sbtn buy" onclick="openUrl('${m.id}')">🛒 購入する</button>
        </div>
      </div>`;
    }
    return `<div class="mitem">
      <div class="mitem-top">
        <div class="micon ${m.category}">${icon}</div>
        <div class="mbody">
          <div class="mname">${m.name}</div>
          <div class="mtags">${catTag}${tTags}${nfcTag}</div>
        </div>
        <div class="macts">
          <button class="ibtn" onclick="openEdit('${m.id}')" title="編集">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/>
            </svg>
          </button>
          <button class="ibtn del" onclick="delMed('${m.id}')" title="削除">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      </div>
      ${stockHtml}
    </div>`;
  }).join('');
}

function openUrl(mid){
  const m=S.medicines.find(x=>x.id===mid);
  if(m?.purchaseUrl)window.open(m.purchaseUrl,'_blank');
}
function delMed(id){
  if(!confirm('削除しますか？過去の記録は残ります。'))return;
  S.medicines=S.medicines.filter(m=>m.id!==id);save();renderMeds();
}

// ── STOCK MODAL ──
function openStock(mid){
  stockMid=mid;
  const m=S.medicines.find(x=>x.id===mid);if(!m)return;
  const unit=m.unit||'錠';
  document.getElementById('stock-title').textContent=m.name+' — 在庫管理';
  document.getElementById('scur-val').textContent=(m.rem!=null?m.rem:'—')+' '+unit;
  document.getElementById('scur-sub').textContent=m.reorder?`発注点: ${m.reorder}${unit} | 初期在庫: ${m.initStock||'—'}${unit}`:'発注点: 未設定';
  ['lot-qty','lot-note','lot-reorder','fix-qty','fix-note'].forEach(id=>document.getElementById(id).value='');
  setStockTab('add');renderLots(mid);
  document.getElementById('ov-stock').classList.add('open');
}

function setStockTab(t){
  stockTab=t;
  document.getElementById('stab-add').classList.toggle('on',t==='add');
  document.getElementById('stab-fix').classList.toggle('on',t==='fix');
  document.getElementById('sf-add').style.display=t==='add'?'block':'none';
  document.getElementById('sf-fix').style.display=t==='fix'?'block':'none';
}

function execLot(){
  const m=S.medicines.find(x=>x.id===stockMid);if(!m)return;
  const qty=parseFloat(document.getElementById('lot-qty').value);
  if(!qty||qty<=0){banner('⚠ 追加数量を入力してください','ng');return;}
  const note=document.getElementById('lot-note').value.trim();
  const nr=document.getElementById('lot-reorder').value;
  if(nr)m.reorder=parseInt(nr);
  m.rem=(m.rem||0)+qty;
  S.lots.push({id:uid(),mid:stockMid,type:'add',qty,note,ts:new Date().toISOString()});
  save();
  const unit=m.unit||'錠';
  document.getElementById('scur-val').textContent=m.rem+' '+unit;
  document.getElementById('scur-sub').textContent=m.reorder?`発注点: ${m.reorder}${unit}`:'発注点: 未設定';
  renderLots(stockMid);
  banner(`✓ ${qty}${unit}追加 → 残${m.rem}${unit}`,'ok');
  renderMeds();
}

function execFix(){
  const m=S.medicines.find(x=>x.id===stockMid);if(!m)return;
  const raw=document.getElementById('fix-qty').value;
  if(raw===''||raw==null){banner('⚠ 残量を入力してください','ng');return;}
  const qty=parseFloat(raw),old=m.rem;
  const note=document.getElementById('fix-note').value.trim();
  m.rem=qty;
  S.lots.push({id:uid(),mid:stockMid,type:'fix',qty,qtyBefore:old,note,ts:new Date().toISOString()});
  save();
  const unit=m.unit||'錠';
  document.getElementById('scur-val').textContent=qty+' '+unit;
  renderLots(stockMid);
  banner(`✓ 在庫を${qty}${unit}に訂正しました`,'ok');
  checkReorder(m);renderMeds();
}

function renderLots(mid){
  const el=document.getElementById('lot-history');
  const lots=S.lots.filter(l=>l.mid===mid).sort((a,b)=>b.ts.localeCompare(a.ts)).slice(0,20);
  if(!lots.length){el.innerHTML='';return;}
  const m=S.medicines.find(x=>x.id===mid),unit=m?.unit||'錠';
  el.innerHTML=`<div class="lot-history-title">入荷・訂正ログ</div>`+
    lots.map(l=>{
      const d=new Date(l.ts).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});
      const t=new Date(l.ts).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      const isAdd=l.type==='add';
      return `<div class="lot-item">
        <span class="lot-date">${d} ${t}</span>
        <span class="lot-qty ${isAdd?'add':'fix'}">${isAdd?'+'+l.qty+unit:'→'+l.qty+unit}</span>
        <span class="lot-note">${l.note||''}</span>
      </div>`;
    }).join('');
}

// ── REORDER CHECK ──
function checkReorder(m){
  if(!m.stockManaged||m.rem==null||m.reorder==null)return;
  if(m.rem<=0){
    banner(`🚨 ${m.name} 在庫切れ！発注してください`,'warn');
    push(`🚨 ${m.name} 在庫切れ`,`残量0${m.unit||'錠'} — 今すぐ発注が必要です`,'zero-'+m.id);
  } else if(m.rem<=m.reorder){
    banner(`⚠ ${m.name} 発注点以下（残${m.rem}${m.unit||'錠'}）`,'warn');
    push(`⚠ ${m.name} 残量わずか`,`残り${m.rem}${m.unit||'錠'} — 発注点(${m.reorder})以下`,'ro-'+m.id);
  }
}
function push(title,body,tag){
  if('Notification' in window&&Notification.permission==='granted')new Notification(title,{body,tag});
}

// ── HISTORY ──
function renderHistory(){
  const el=document.getElementById('hlist');
  const all=[
    ...S.records.map(r=>({...r,etype:'dose'})),
    ...S.lots.map(l=>({...l,etype:'lot'}))
  ].sort((a,b)=>b.ts.localeCompare(a.ts));
  document.getElementById('hist-sub').textContent=
    `服薬 ${S.records.length}件 / 在庫操作 ${S.lots.length}件`;
  if(!all.length){
    el.innerHTML=`<div class="empty"><div class="ei">📋</div><p>まだ記録がありません</p></div>`;return;
  }
  const grouped={};
  all.forEach(e=>{const d=e.ts.slice(0,10);if(!grouped[d])grouped[d]=[];grouped[d].push(e);});
  el.innerHTML=Object.entries(grouped).slice(0,60).map(([date,evts])=>{
    const d=new Date(date+'T00:00:00');
    const lbl=d.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
    return `<div class="hday">${lbl}</div>`+evts.map(e=>{
      const m=S.medicines.find(x=>x.id===e.mid);if(!m)return'';
      const icon=m.category==='supplement'?'🌿':'💊';
      const time=new Date(e.ts).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      if(e.etype==='dose'){
        return `<div class="hitem">
          <div class="hdot ${m.category}"></div>
          <div class="hinfo">
            <div class="hname">${icon} ${m.name}</div>
            <div class="hmeta">${TL[e.timing]||e.timing} · ${time} · ${m.dosagePerTake}${m.unit||'錠'}</div>
          </div>
          <span class="hbadge ${e.method==='nfc'?'nfc':'dose'}">${e.method==='nfc'?'NFC':'手動'}</span>
        </div>`;
      } else {
        const isAdd=e.type==='add';
        return `<div class="hitem">
          <div class="hdot ${isAdd?'lot':'fix'}"></div>
          <div class="hinfo">
            <div class="hname">${icon} ${m.name}</div>
            <div class="hmeta">${isAdd?`＋${e.qty}${m.unit||'錠'} 入荷`:`在庫訂正 → ${e.qty}${m.unit||'錠'}`} · ${time}${e.note?' · '+e.note:''}</div>
          </div>
          <span class="hbadge ${isAdd?'lot':'fix'}">${isAdd?'入荷':'訂正'}</span>
        </div>`;
      }
    }).join('');
  }).join('');
}

// ── MEDICINE MODAL ──
function resetModal(){
  editId=null;pendingTag=null;linkingNFC=false;
  ['in-name','in-note','in-init','in-reorder','in-url'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('in-dose').value='1';
  document.getElementById('in-unit').value='錠';
  document.querySelectorAll('.tchip').forEach(c=>c.classList.remove('on'));
  setType('medicine');
  useStock=false;
  document.getElementById('tog-stock').classList.remove('on');
  document.getElementById('stock-setup').style.display='none';
  document.getElementById('nfc-row').classList.remove('linked');
  document.getElementById('nfc-lbl').textContent='タグをタッチして連携';
  document.getElementById('nfc-st').textContent='未連携';
}

function openAdd(){
  resetModal();
  document.getElementById('main-title').textContent='薬・サプリを追加';
  document.getElementById('ov-main').classList.add('open');
}

function openEdit(id){
  const m=S.medicines.find(x=>x.id===id);if(!m)return;
  resetModal();editId=id;pendingTag=m.nfcTag||null;
  document.getElementById('main-title').textContent='編集';
  document.getElementById('in-name').value=m.name;
  document.getElementById('in-dose').value=m.dosagePerTake;
  document.getElementById('in-unit').value=m.unit||'錠';
  document.getElementById('in-note').value=m.note||'';
  document.getElementById('in-init').value=m.initStock||'';
  document.getElementById('in-reorder').value=m.reorder||'';
  document.getElementById('in-url').value=m.purchaseUrl||'';
  setType(m.category);
  m.timings.forEach(t=>{const c=document.querySelector(`.tchip[data-t="${t}"]`);if(c)c.classList.add('on');});
  useStock=m.stockManaged||false;
  document.getElementById('tog-stock').classList.toggle('on',useStock);
  document.getElementById('stock-setup').style.display=useStock?'block':'none';
  if(m.nfcTag){
    document.getElementById('nfc-row').classList.add('linked');
    document.getElementById('nfc-lbl').textContent='タグ連携済み';
    document.getElementById('nfc-st').textContent='…'+m.nfcTag.slice(-6);
  }
  document.getElementById('ov-main').classList.add('open');
}

function ovClose(name,e){if(e.target===document.getElementById('ov-'+name))closeOv(name);}
function closeOv(name){document.getElementById('ov-'+name).classList.remove('open');if(name==='main')linkingNFC=false;}
function setType(t){
  curType=t;
  document.getElementById('ty-med').className='tychip medicine'+(t==='medicine'?' on':'');
  document.getElementById('ty-sup').className='tychip supplement'+(t==='supplement'?' on':'');
}
function togT(btn){btn.classList.toggle('on');}
function togStock(){
  useStock=!useStock;
  document.getElementById('tog-stock').classList.toggle('on',useStock);
  document.getElementById('stock-setup').style.display=useStock?'block':'none';
}

function saveMed(){
  const name=document.getElementById('in-name').value.trim();
  if(!name){banner('⚠ 名前を入力してください','ng');return;}
  const timings=[...document.querySelectorAll('.tchip.on')].map(c=>c.dataset.t);
  if(!timings.length){banner('⚠ タイミングを選択してください','ng');return;}
  const dosagePerTake=parseFloat(document.getElementById('in-dose').value)||1;
  const unit=document.getElementById('in-unit').value;
  const note=document.getElementById('in-note').value.trim();
  const initRaw=document.getElementById('in-init').value;
  const reorderRaw=document.getElementById('in-reorder').value;
  const urlRaw=document.getElementById('in-url').value.trim();
  const initStock=useStock&&initRaw?parseInt(initRaw):null;
  const reorder=useStock&&reorderRaw?parseInt(reorderRaw):null;
  if(editId){
    const m=S.medicines.find(x=>x.id===editId);
    if(m){
      const prevInit=m.initStock;
      Object.assign(m,{name,category:curType,timings,dosagePerTake,unit,note,
        stockManaged:useStock,reorder,purchaseUrl:urlRaw||null,nfcTag:pendingTag,
        initStock:initStock??m.initStock,
        rem:(initStock&&initStock!==prevInit)?initStock:(m.rem)});
    }
    banner('✓ 更新しました','ok');
  } else {
    S.medicines.push({
      id:uid(),nfcTag:pendingTag,name,category:curType,
      timings,dosagePerTake,unit,note,
      stockManaged:useStock,initStock,rem:initStock,reorder,
      purchaseUrl:urlRaw||null,startDate:todayKey(),active:true
    });
    banner(`✓ ${name} を追加しました`,'ok');
  }
  save();closeOv('main');renderMeds();renderToday();
}

// ── BANNER & NOTIF ──
function banner(msg,type){
  const el=document.getElementById('banner');
  el.textContent=msg;el.className='banner '+type;
  if(bannerTimer)clearTimeout(bannerTimer);
  bannerTimer=setTimeout(()=>el.className='banner',3500);
}
async function reqNotif(){
  if('Notification' in window&&Notification.permission==='default')
    await Notification.requestPermission();
}
function checkMissed(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const now=new Date(),h=now.getHours(),today=todayKey();
  S.medicines.filter(m=>m.active!==false).forEach(m=>{
    m.timings.forEach(t=>{
      if(h>=TW[t][1]&&!isTaken(m.id,t,today))
        push('💊 飲み忘れ注意！',`${m.name}（${TL[t]}）がまだ記録されていません`,m.id+'-'+t+'-'+today);
    });
    checkReorder(m);
  });
}

// ── INIT ──
load();
renderToday();
document.getElementById('today-date').textContent=
  new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
document.getElementById('fab').style.display='none';
reqNotif();
setInterval(checkMissed,10*60*1000);
</script>
